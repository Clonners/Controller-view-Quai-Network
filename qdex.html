  <style>
/* ═══════════════════════════════════════════════════
   QDEX — Terminal Exchange UI
   ═══════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #050307;
  --surface:   #12070b;
  --surface-2: #0a0509;
  --surface-3: #1a0e15;
  --border:    #301219;
  --border-hi: #4a1c2a;
  --accent:    #ff253a;
  --accent-soft: rgba(255, 37, 58, 0.18);

  --text:      #e5e7eb;
  --text-dim:  #9ca3af;
  --text-muted:#8b949e;

  --green:     #4ade80;
  --green-bg:  rgba(74,222,128,.10);
  --red:       #ff4b4b;
  --red-bg:    rgba(255,75,75,.10);
  --yellow:    #f59e0b;
  --yellow-bg: rgba(245,158,11,.10);
  --blue:      #60a5fa;
  --blue-bg:   rgba(96,165,250,.10);

  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', ui-monospace, Consolas, monospace;
}

html {
  background: radial-gradient(circle at top, #2b0005 0, #050307 40%, #020005 80%);
  color: var(--text);
  font: 13px/1.5 var(--mono);
}
body { min-height: 100vh; display: flex; flex-direction: column; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font: inherit; cursor: pointer; }
input { font: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── QDEX Top Bar ──────────────────────────────── */
.qdex-topbar {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px; height: 44px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.qdex-topbar-brand {
  font-weight: 800; font-size: 15px; letter-spacing: .08em;
  color: var(--accent); margin-right: 8px;
}
.qdex-topbar-brand span { color: var(--text-dim); font-weight: 400; }
.qdex-topbar-tabs { display: flex; gap: 2px; height: 100%; align-items: stretch; }
.qdex-topbar-tab {
  padding: 0 14px; display: flex; align-items: center;
  font-size: 12px; color: var(--text-dim);
  background: none; border: none; border-bottom: 2px solid transparent;
}
.qdex-topbar-tab:hover { color: var(--text); }
.qdex-topbar-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.qdex-topbar-spacer { flex: 1; }
.qdex-topbar-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-muted);
}
.qdex-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}
.qdex-status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

/* ── Ticker Strip ──────────────────────────────── */
.qdex-ticker-strip {
  display: flex; align-items: center; gap: 20px;
  padding: 6px 16px; height: 36px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.qdex-ticker-pair {
  font-weight: 700; font-size: 14px; color: var(--text);
  letter-spacing: .03em;
}
.qdex-ticker-stat { display: flex; flex-direction: column; line-height: 1.2; }
.qdex-ticker-stat label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
.qdex-ticker-stat .val { font-weight: 600; }
.qdex-ticker-stat .val.green { color: var(--green); }
.qdex-ticker-stat .val.red { color: var(--red); }
.qdex-ticker-stat .val.dim { color: var(--text-dim); }

/* ── Main Grid ─────────────────────────────────── */
.qdex-main {
  flex: 1; display: grid;
  grid-template-columns: 200px 1fr 300px;
  grid-template-rows: auto 1fr auto;
  gap: 1px; background: var(--border);
}

/* ── Panels ────────────────────────────────────── */
.qdex-panel {
  background: var(--surface);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.qdex-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; font-size: 11px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.qdex-panel-header .count { font-weight: 400; color: var(--text-muted); }
.qdex-panel-body { flex: 1; overflow-y: auto; overflow-x: auto; }

/* ── Markets List ──────────────────────────────── */
.qdex-market-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px; cursor: pointer;
  font-size: 12px; transition: background .1s;
  border-left: 2px solid transparent;
}
.qdex-market-item:hover { background: var(--surface-2); }
.qdex-market-item.active { background: var(--surface-3); border-left-color: var(--accent); }
.qdex-market-item .pair { font-weight: 600; }
.qdex-status-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: var(--yellow-bg); color: var(--yellow);
}

/* ── Orderbook ─────────────────────────────────── */
.qdex-ob-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.qdex-ob-table th {
  position: sticky; top: 0; z-index: 1;
  padding: 5px 12px; text-align: right;
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.qdex-ob-table th:first-child { text-align: left; }
.qdex-ob-table td {
  padding: 2px 12px; text-align: right;
  font-variant-numeric: tabular-nums;
}
.qdex-ob-table td:first-child { text-align: left; }
.qdex-ob-table tr.ask td { color: var(--red); }
.qdex-ob-table tr.bid td { color: var(--green); }
.qdex-ob-table tr.spread td {
  padding: 6px 12px; text-align: center;
  color: var(--text-muted); font-size: 11px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.qdex-ob-depth-bar {
  position: absolute; right: 0; top: 0; bottom: 0;
  opacity: .08; pointer-events: none;
}
.qdex-ob-depth-bar.ask { background: var(--red); }
.qdex-ob-depth-bar.bid { background: var(--green); }

/* ── Trade History ─────────────────────────────── */
.qdex-trades-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.qdex-trades-table th {
  position: sticky; top: 0; z-index: 1;
  padding: 5px 12px; text-align: right;
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
  background: var(--surface);
}
.qdex-trades-table th:first-child { text-align: left; }
.qdex-trades-table td {
  padding: 2px 12px; text-align: right;
  font-variant-numeric: tabular-nums;
}
.qdex-trades-table td:first-child { text-align: left; }
.qdex-trade-side.buy { color: var(--green); }
.qdex-trade-side.sell { color: var(--red); }

/* ── Trade Form ────────────────────────────────── */
.qdex-trade-form-panel { padding: 12px; }
.qdex-side-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.qdex-side-tab {
  flex: 1; padding: 8px; text-align: center;
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  border-radius: 6px; border: 1px solid var(--border);
  background: none; transition: all .15s;
}
.qdex-side-tab.buy { color: var(--text-dim); }
.qdex-side-tab.buy.active { color: #fff; background: var(--green); border-color: var(--green); }
.qdex-side-tab.sell { color: var(--text-dim); }
.qdex-side-tab.sell.active { color: #fff; background: var(--red); border-color: var(--red); }
.qdex-order-type-tabs { display: flex; gap: 2px; margin-bottom: 12px; }
.qdex-order-type-tab {
  padding: 4px 10px; font-size: 11px;
  color: var(--text-muted); background: none; border: none;
  border-radius: 4px;
}
.qdex-order-type-tab.active { color: var(--text); background: var(--surface-3); }
.qdex-form-group { margin-bottom: 10px; }
.qdex-form-group label {
  display: block; font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 4px;
}
.qdex-input-row {
  display: flex; align-items: center;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface-2); overflow: hidden;
}
.qdex-input-row:focus-within { border-color: var(--border-hi); }
.qdex-input-row input {
  flex: 1; padding: 8px 10px;
  background: none; border: none; color: var(--text);
  font-size: 13px; outline: none;
}
.qdex-input-row .unit {
  padding: 0 10px; font-size: 11px; color: var(--text-muted);
}
.qdex-input-row .step-btn {
  width: 28px; height: 100%; display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--text-muted);
  font-size: 14px; cursor: pointer;
}
.qdex-slider-row { display: flex; gap: 4px; margin-bottom: 12px; }
.qdex-pct-btn {
  flex: 1; padding: 5px; font-size: 11px;
  color: var(--text-muted); background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 4px;
}
.qdex-pct-btn:hover { color: var(--text); border-color: var(--border-hi); }
.qdex-form-total {
  display: flex; justify-content: space-between;
  padding: 8px 0; font-size: 12px;
  color: var(--text-dim); border-top: 1px solid var(--border);
  margin-top: 4px; margin-bottom: 12px;
}
.qdex-form-total .amount { color: var(--text); font-weight: 600; }
.qdex-submit-btn {
  width: 100%; padding: 10px;
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  border: none; border-radius: 6px;
}
.qdex-submit-btn.buy { background: var(--green); color: #fff; }
.qdex-submit-btn.sell { background: var(--red); color: #fff; }
.qdex-submit-btn:disabled { opacity: .4; cursor: not-allowed; }
.qdex-form-balance {
  text-align: right; font-size: 11px; color: var(--text-muted);
  margin-top: 8px;
}

/* ── Bottom Panels ─────────────────────────────── */
.qdex-bottom-panels { grid-column: 1 / -1; }
.qdex-bottom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px; background: var(--border);
  min-height: 150px;
}
.qdex-bottom-panel { background: var(--surface); }
.qdex-tab-bar {
  display: flex; gap: 0;
  padding: 0 12px; border-bottom: 1px solid var(--border);
}
.qdex-tab-item {
  padding: 8px 14px; font-size: 11px; font-weight: 600;
  color: var(--text-muted); background: none; border: none;
  border-bottom: 2px solid transparent;
}
.qdex-tab-item.active { color: var(--text); border-bottom-color: var(--accent); }
.qdex-tab-content { flex: 1; overflow-y: auto; }
.qdex-tab-pane { display: none; }
.qdex-tab-pane.active { display: block; }
.qdex-empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px; color: var(--text-muted); font-size: 12px; text-align: center;
}
.qdex-empty-state .icon { font-size: 28px; margin-bottom: 8px; opacity: .3; }

/* ── Activity Log ──────────────────────────────── */
.qdex-log-entry {
  padding: 4px 12px; font-size: 11px; color: var(--text-muted);
  border-bottom: 1px solid rgba(39,39,42,.5);
}
.qdex-log-entry .time { color: var(--text-muted); margin-right: 8px; }
.qdex-log-entry.info { color: var(--blue); }
.qdex-log-entry.success { color: var(--green); }
.qdex-log-entry.warn { color: var(--yellow); }
.qdex-log-entry.error { color: var(--red); }

/* ── Responsive ────────────────────────────────── */
@media (max-width: 900px) {
  .qdex-main {
    grid-template-columns: 1fr !important;
    grid-template-rows: auto !important;
  }
  .qdex-main > .qdex-panel { grid-column: 1 !important; grid-row: auto !important; }
  .qdex-bottom-grid { grid-template-columns: 1fr; }
  .qdex-ticker-strip { gap: 10px; }
}
  </style>

<script>
// ═══════════════════════════════════════════════════
// QDEX Frontend — Clean Architecture
// Direct fetch to api.bitquai.live
// No SDK, no fallbacks, one data path
// ═══════════════════════════════════════════════════

const API = 'https://api.bitquai.live';
const MARKET = 'WQUAI-WQI';

// ── Helpers ───────────────────────────────────────

const $ = (id) => document.getElementById(id);
const fmt = (v) => v === undefined || v === null ? '—' : Number(v).toFixed(2);

const log = (msg, cls = '') => {
  const entry = document.createElement('div');
  entry.className = 'qdex-log-entry ' + cls;
  entry.innerHTML = `<span class="time">${new Date().toLocaleTimeString('en-US', {hour12:false})}</span>${msg}`;
  const container = $('activityLog');
  if (container) {
    container.prepend(entry);
    while (container.children.length > 50) container.removeChild(container.lastChild);
  }
};

// ── API ───────────────────────────────────────────

async function api(path) {
  const res = await fetch(`${API}${path}`);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
  return res.json();
}

// ── Orderbook ─────────────────────────────────────

async function loadOrderbook() {
  const data = await api(`/v1/orderbook/${MARKET}`);
  const bids = data.bids || [];
  const asks = data.asks || [];
  const tbody = $('obBody');
  if (!tbody) return;

  tbody.innerHTML = '';

  const maxVol = Math.max(
    ...asks.map(a => Number(a.amount) || 0),
    ...bids.map(b => Number(b.amount) || 0),
    1
  );

  // Asks (reversed so highest price on top)
  for (let i = Math.min(asks.length, 10) - 1; i >= 0; i--) {
    const a = asks[i];
    const total = (Number(a.price) * Number(a.amount)).toFixed(2);
    const pct = (Number(a.amount) / maxVol * 100).toFixed(1);
    tbody.insertAdjacentHTML('beforeend', `
      <tr class="ask">
        <td>${fmt(a.price)}</td>
        <td>${fmt(a.amount)}</td>
        <td>${total}</td>
      </tr>
    `);
  }

  // Spread
  if (bids.length > 0 && asks.length > 0) {
    const spread = (Number(asks[0].price) - Number(bids[0].price)).toFixed(2);
    tbody.insertAdjacentHTML('beforeend', `
      <tr class="spread"><td colspan="3">Spread: ${spread}</td></tr>
    `);
  }

  // Bids
  for (let i = 0; i < Math.min(bids.length, 10); i++) {
    const b = bids[i];
    const total = (Number(b.price) * Number(b.amount)).toFixed(2);
    tbody.insertAdjacentHTML('beforeend', `
      <tr class="bid">
        <td>${fmt(b.price)}</td>
        <td>${fmt(b.amount)}</td>
        <td>${total}</td>
      </tr>
    `);
  }

  // Update UI
  $('obCount').textContent = `${bids.length + asks.length} levels`;

  // Ticker
  if (bids.length > 0) $('tickerBid').textContent = fmt(bids[0].price);
  if (asks.length > 0) $('tickerAsk').textContent = fmt(asks[0].price);

  log(`Orderbook: ${bids.length} bids, ${asks.length} asks`, 'success');
}

// ── Trades ────────────────────────────────────────

async function loadTrades() {
  const data = await api(`/v1/trades/${MARKET}`);
  const trades = data.trades || [];
  const tbody = $('tradesBody');
  if (!tbody) return;

  tbody.innerHTML = '';

  for (const t of trades.slice(0, 50)) {
    const ts = t.createdAt ? new Date(t.createdAt).toLocaleTimeString('en-US', {hour12: false}) : '—';
    const side = t.side || 'buy';
    const total = (Number(t.price) * Number(t.amount)).toFixed(2);
    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${ts}</td>
        <td class="qdex-trade-side ${side}">${side.toUpperCase()}</td>
        <td>${fmt(t.price)}</td>
        <td>${fmt(t.amount)}</td>
        <td>${total}</td>
      </tr>
    `);
  }

  $('tradesCount').textContent = trades.length;
  if (trades.length > 0) {
    $('tickerLast').textContent = fmt(trades[0].price);
  }

  log(`Trades: ${trades.length}`, 'success');
}

// ── Refresh ───────────────────────────────────────

async function refresh() {
  try {
    await Promise.all([loadOrderbook(), loadTrades()]);
    $('apiState').textContent = 'Orchard testnet';
    $('statusDot').className = 'qdex-status-dot';
  } catch (e) {
    $('apiState').textContent = 'Disconnected';
    $('statusDot').className = 'qdex-status-dot offline';
    log(`Error: ${e.message}`, 'error');
  }
}

// ── UI ────────────────────────────────────────────

function setSide(side) {
  document.querySelectorAll('.qdex-side-tab').forEach(el => el.classList.remove('active'));
  const tab = side === 'buy' ? document.querySelector('.qdex-side-tab.buy') : document.querySelector('.qdex-side-tab.sell');
  if (tab) tab.classList.add('active');
}

function switchView(view) {
  document.querySelectorAll('.qdex-topbar-tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
}

// ── Init ──────────────────────────────────────────

refresh();
setInterval(refresh, 3000);
log('QDEX connected to ' + API, 'info');
</script>
</body>
</html>
