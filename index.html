  <style>
    :root {
      color-scheme: dark;
      --bg: #050307;
      --panel: #12070b;
      --panel-2: #1a0a10;
      --border: #301219;
      --border-strong: rgba(255, 37, 58, 0.34);
      --accent: #ff253a;
      --accent-soft: rgba(255, 37, 58, 0.16);
      --text: #f6f7fb;
      --muted: #c0c6d2;
      --dim: #8b92a0;
      --green: #4ade80;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.72);
      --radius-lg: 28px;
      --radius-md: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 37, 58, 0.22) 0%, rgba(255, 37, 58, 0.03) 34%, transparent 56%),
        radial-gradient(circle at 86% 18%, rgba(255, 37, 58, 0.14) 0%, transparent 30%),
        linear-gradient(180deg, #070307 0%, #050307 54%, #020103 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.7), transparent 72%);
      opacity: .38;
      z-index: 0;
    }

    a { color: inherit; }

    .shell {
      position: relative;
      z-index: 1;
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 20px 20px 56px;
    }

    .topnav {
      position: sticky;
      top: 14px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 37, 58, 0.16);
      background: rgba(18, 7, 11, 0.78);
      backdrop-filter: blur(16px);
      border-radius: 999px;
      box-shadow: 0 14px 40px rgba(0,0,0,.42);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      padding-left: 4px;
      min-width: 0;
    }

    .brand img {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(255, 37, 58, .28), 0 0 28px rgba(255, 37, 58, .18);
    }

    .brand-text { display: grid; line-height: 1.05; }
    .brand-text strong { letter-spacing: .04em; font-size: 14px; }
    .brand-text span { color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }

    .navlinks {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .navlinks a, .navlinks span {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      font-size: 13px;
      transition: color .18s, border-color .18s, background .18s, transform .18s;
    }

    .navlinks a:hover {
      color: var(--text);
      background: rgba(255, 37, 58, .08);
      border-color: rgba(255, 37, 58, .18);
      transform: translateY(-1px);
    }

    .navlinks .active {
      color: var(--accent);
      background: rgba(255, 37, 58, .12);
      border-color: rgba(255, 37, 58, .24);
      font-weight: 700;
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 92px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(5,3,7,.2) 0%, rgba(5,3,7,.65) 100%);
      pointer-events: none;
    }

    .hero-brand {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .hero-brand .logo-lg {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 0 0 2px rgba(255,37,58,.35), 0 0 48px rgba(255,37,58,.25);
    }

    .hero-brand .tagline {
      margin-top: 16px;
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(246,247,251,.55);
    }

    @media (max-width: 900px) {
      .hero { min-height: calc(100vh - 140px); }
      .hero-brand .logo-lg { width: 56px; height: 56px; }
    }

    .section-label {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .surfaces {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .surface-card {
      position: relative;
      min-height: 250px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 22px;
      border-radius: 24px;
      border: 1px solid rgba(255, 37, 58, .17);
      background:
        linear-gradient(180deg, rgba(26,10,16,.94), rgba(10,5,9,.88)),
        radial-gradient(circle at 20% 0%, rgba(255, 37, 58, .18), transparent 34%);
      text-decoration: none;
      overflow: hidden;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .surface-card::after {
      content: "";
      position: absolute;
      inset: auto -18% -38% auto;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      border: 1px solid rgba(255, 37, 58, .22);
      background: rgba(255,37,58,.08);
      filter: blur(.2px);
    }

    .surface-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 37, 58, .42);
      box-shadow: 0 22px 54px rgba(0,0,0,.54);
    }

    .surface-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .surface-card h2 {
      margin: auto 0 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: .95;
      letter-spacing: -.04em;
    }

    .surface-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: 310px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: #cdd2dc;
      font-size: 12px;
    }

    .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--green); box-shadow: 0 0 16px rgba(74,222,128,.5); }
    .dot.demo { background: #f59e0b; box-shadow: 0 0 16px rgba(245,158,11,.5); }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 42px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 37, 58, .14);
      color: var(--dim);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    @media (max-width: 900px) {
      .topnav { align-items: flex-start; border-radius: 24px; flex-direction: column; }
      .navlinks { justify-content: flex-start; }
      .surfaces { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .shell { padding-inline: 14px; }
      .navlinks { width: 100%; }
      .navlinks a, .navlinks span { flex: 1 1 auto; justify-content: center; padding-inline: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>

    <footer class="footer">

    </footer>
  </main>
