  <style>
    :root {
      color-scheme: dark;
      --bg: #050307;
      --panel: #12070b;
      --panel-2: #1a0a10;
      --border: #301219;
      --border-strong: rgba(255, 37, 58, 0.34);
      --accent: #ff253a;
      --accent-soft: rgba(255, 37, 58, 0.16);
      --text: #f6f7fb;
      --muted: #c0c6d2;
      --dim: #8b92a0;
      --green: #4ade80;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.72);
      --radius-lg: 28px;
      --radius-md: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: #050307;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.7) 30%, transparent 100%);
      opacity: .38;
      z-index: 0;
    }

    a { color: inherit; }

    .shell {
      position: relative;
      z-index: 1;
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 20px 20px 56px;
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 92px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .hero-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(5,3,7,.15) 0%, rgba(5,3,7,.45) 100%);
      pointer-events: none;
    }

    .section-label {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .surfaces {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .surface-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 37, 58, .17);
      background:
        linear-gradient(180deg, rgba(26,10,16,.96), rgba(10,5,9,.9)),
        radial-gradient(circle at 20% 0%, rgba(255, 37, 58, .18), transparent 34%);
      text-decoration: none;
      overflow: hidden;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .surface-card::after {
      content: "";
      position: absolute;
      inset: auto -18% -38% auto;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      border: 1px solid rgba(255, 37, 58, .22);
      background: rgba(255,37,58,.08);
      filter: blur(.2px);
    }

    .surface-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 37, 58, .42);
      box-shadow: 0 22px 54px rgba(0,0,0,.54);
    }

    .surface-card .preview {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 14px;
      border: 1px solid rgba(255, 37, 58, .12);
      overflow: hidden;
      background: #0a0508;
    }

    .surface-card .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .surface-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .surface-card h2 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
      line-height: .95;
      letter-spacing: -.03em;
    }

    .surface-card p {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
      max-width: 280px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: #cdd2dc;
      font-size: 12px;
    }

    .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--green); box-shadow: 0 0 16px rgba(74,222,128,.5); }
    .dot.demo { background: #f59e0b; box-shadow: 0 0 16px rgba(245,158,11,.5); }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 42px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 37, 58, .14);
      color: var(--dim);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    @media (max-width: 900px) {
      .surfaces { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .shell { padding-inline: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
